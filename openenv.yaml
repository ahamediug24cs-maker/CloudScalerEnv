name: "CloudScalerEnv"
version: "1.0.0"
description: "An environment where an autonomous agent acts as an SRE, scaling and restarting microservices to optimize resource utilization and prevent crashes."
author: "OpenEnv Contributor"
license: "MIT"
tags:
  - "openenv"
  - "devops"
  - "sre"
  - "resource-optimization"

environment:
  entrypoint: "src.env:CloudScalerEnv"
  state_model: "src.models:Observation"
  action_model: "src.models:Action"
  reward_model: "src.models:Reward"

tasks:
  - id: "easy-memory-leak"
    difficulty: "easy"
    description: "Restart a service before it runs out of memory."
    task_loader: "src.tasks:get_task_easy"
    grader: "src.graders:grade_easy"
    grader_entrypoint: "src.graders:grade_easy"
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
  - id: "medium-traffic-spike"
    difficulty: "medium"
    description: "Scale services up and down to handle CPU load efficiently."
    task_loader: "src.tasks:get_task_medium"
    grader: "src.graders:grade_medium"
    grader_entrypoint: "src.graders:grade_medium"
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
  - id: "hard-cascading-failure"
    difficulty: "hard"
    description: "Manage multiple failing services under a strict resource budget."
    task_loader: "src.tasks:get_task_hard"
    grader: "src.graders:grade_hard"
    grader_entrypoint: "src.graders:grade_hard"
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
