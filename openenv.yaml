name: "CloudScalerEnv"
version: "1.0.0"
description: "SRE environment for autoscaling and recovery under budget and SLA constraints."
author: "OpenEnv Contributor"
license: "MIT"
tags:
  - "openenv"
  - "devops"
  - "sre"
  - "resource-optimization"

environment:
  entrypoint: "src.env:CloudScalerEnv"
  state_model: "src.models:Observation"
  action_model: "src.models:Action"
  reward_model: "src.models:Reward"

tasks:
  - id: "easy-memory-leak"
    task_id: "easy-memory-leak"
    difficulty: "easy"
    description: "Restart a leaking service before crash with minimal overhead."
    task_loader: "src.tasks:get_task_easy"
    task_entrypoint: "src.tasks:get_task_easy"
    grader: "src.tasks:grade_easy"
    grader_entrypoint: "src.tasks:grade_easy"
    grader_fn: "src.tasks:grade_easy"

  - id: "medium-traffic-spike"
    task_id: "medium-traffic-spike"
    difficulty: "medium"
    description: "Handle multi-service CPU spikes while staying near SLA band."
    task_loader: "src.tasks:get_task_medium"
    task_entrypoint: "src.tasks:get_task_medium"
    grader: "src.tasks:grade_medium"
    grader_entrypoint: "src.tasks:grade_medium"
    grader_fn: "src.tasks:grade_medium"

  - id: "hard-cascading-failure"
    task_id: "hard-cascading-failure"
    difficulty: "hard"
    description: "Prevent cascading failures across dependencies under tight budget."
    task_loader: "src.tasks:get_task_hard"
    task_entrypoint: "src.tasks:get_task_hard"
    grader: "src.tasks:grade_hard"
    grader_entrypoint: "src.tasks:grade_hard"
    grader_fn: "src.tasks:grade_hard"

graders:
  easy-memory-leak:
    entrypoint: "src.tasks:grade_easy"
    task_loader: "src.tasks:get_task_easy"
  medium-traffic-spike:
    entrypoint: "src.tasks:grade_medium"
    task_loader: "src.tasks:get_task_medium"
  hard-cascading-failure:
    entrypoint: "src.tasks:grade_hard"
    task_loader: "src.tasks:get_task_hard"
